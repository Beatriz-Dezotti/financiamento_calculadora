<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testes - Calculadora de Financiamento</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .test {
            margin: 10px 0;
            padding: 12px;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #ccc;
        }
        .pass {
            border-left-color: #28a745;
            background: #d4edda;
        }
        .fail {
            border-left-color: #dc3545;
            background: #f8d7da;
        }
        .pass-text {
            color: #155724;
            font-weight: bold;
        }
        .fail-text {
            color: #721c24;
            font-weight: bold;
        }
        .resumo {
            margin-top: 20px;
            padding: 15px;
            background: #333;
            color: white;
            border-radius: 8px;
            text-align: center;
            font-size: 18px;
        }
        .sucesso {
            background: #28a745;
        }
        .erro {
            background: #dc3545;
        }
        button {
            margin: 20px 0;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #5a67d8;
        }
    </style>
</head>
<body>
    <h1>🧪 Testes Automatizados</h1>
    <p>Calculadora de Financiamento Imobiliário</p>
    
    <button onclick="executarTestes()">▶ Executar Testes</button>
    
    <div id="resultados"></div>

    <script src="script.js"></script>
    <script>
        let totalTestes = 0;
        let testesPassaram = 0;
        const resultadosDiv = document.getElementById('resultados');
        
        function assert(condicao, nomeTeste, detalhes = '') {
            totalTestes++;
            const div = document.createElement('div');
            div.className = 'test';
            
            if (condicao) {
                testesPassaram++;
                div.classList.add('pass');
                div.innerHTML = `<span class="pass-text">✅ PASS:</span> ${nomeTeste}`;
            } else {
                div.classList.add('fail');
                div.innerHTML = `<span class="fail-text">❌ FAIL:</span> ${nomeTeste}`;
                if (detalhes) {
                    div.innerHTML += `<br><small style="color:#666;">${detalhes}</small>`;
                }
            }
            
            resultadosDiv.appendChild(div);
        }
        
        async function executarTestes() {
            // Limpar resultados anteriores
            resultadosDiv.innerHTML = '';
            totalTestes = 0;
            testesPassaram = 0;

            // Criar um container para o resumo que será atualizado depois
            const resumoContainer = document.createElement('div');
            resumoContainer.id = 'resumoContainer';
            resultadosDiv.appendChild(resumoContainer);
            
            // Verificar se as funções existem
            const funcoes = [
                'calcularPrimeiraParcelaSAC',
                'calcularParcelaPrice',
                'calcularPercentualRenda',
                'gerarAlertaOrcamento'
            ];
            
            for (const fn of funcoes) {
                assert(typeof window[fn] === 'function', `Função ${fn} existe`, `Verifique se a função ${fn} está definida no script.js`);
            }
            
            // Teste 1: SAC
            if (typeof calcularPrimeiraParcelaSAC === 'function') {
                const sac = calcularPrimeiraParcelaSAC(240000, 0.008, 360);
                assert(Math.abs(sac - 2586.6666666666665) < 0.01, 'SAC - primeira parcela deve ser R$ 2.586,67', `Obtido: R$ ${sac.toFixed(2)}`);
            }
            
            // Teste 2: Price
            if (typeof calcularParcelaPrice === 'function') {
                const price = calcularParcelaPrice(240000, 0.008, 360);
                assert(Math.abs(price - 2035.582777666447) < 0.01, 'Price - parcela deve ser R$ 2.035,58', `Obtido: R$ ${price.toFixed(2)}`);
            }
            
            // Teste 3: Percentual da renda
            if (typeof calcularPercentualRenda === 'function') {
                const perc = calcularPercentualRenda(2720, 8000);
                assert(Math.abs(perc - 34.0) < 0.01, 'Percentual renda - deve ser 34%', `Obtido: ${perc.toFixed(1)}%`);
            }
            
            // Teste 4: Alerta verde (≤30%)
            if (typeof gerarAlertaOrcamento === 'function') {
                const alertaVerde = gerarAlertaOrcamento(25);
                assert(alertaVerde.includes('✅'), 'Alerta verde - deve conter ✅', `Não encontrou ✅ em: ${alertaVerde.substring(0, 50)}`);
            }
            
            // Teste 5: Alerta amarelo (31-40%)
            if (typeof gerarAlertaOrcamento === 'function') {
                const alertaAmarelo = gerarAlertaOrcamento(35);
                assert(alertaAmarelo.includes('⚠️'), 'Alerta amarelo - deve conter ⚠️', `Não encontrou ⚠️ em: ${alertaAmarelo.substring(0, 50)}`);
            }
            
            // Teste 6: Alerta vermelho (>40%)
            if (typeof gerarAlertaOrcamento === 'function') {
                const alertaVermelho = gerarAlertaOrcamento(45);
                assert(alertaVermelho.includes('🔴'), 'Alerta vermelho - deve conter 🔴', `Não encontrou 🔴 em: ${alertaVermelho.substring(0, 50)}`);
            }
            
            // Teste 7: Valor financiado não pode ser negativo
            if (typeof calcularPrimeiraParcelaSAC === 'function') {
                const sacNegativo = calcularPrimeiraParcelaSAC(100000, 0.008, 360);
                assert(sacNegativo > 0, 'SAC - valor da parcela deve ser positivo', `Obtido: R$ ${sacNegativo.toFixed(2)}`);
            }

                        
            // ============================================
            // TESTES DE INTEGRAÇÃO - API DO BANCO CENTRAL
            // ============================================
            
            // Teste 8: API do BCB - verificar se fetch está disponível
            if (typeof fetch !== 'undefined') {
                assert(true, 'API do BCB - fetch disponível no navegador', '');
            } else {
                assert(false, 'API do BCB - fetch disponível no navegador', 'A API fetch não está disponível');
            }
            
            // Teste 9: API do BCB - requisição HTTP bem-sucedida (usando async)
            // Este teste precisa ser assíncrono, então usamos uma Promise
            if (typeof fetch !== 'undefined') {
                const urlTeste = 'https://api.bcb.gov.br/dados/serie/bcdata.sgs.11/dados?formato=json&dataInicial=01/01/2025&dataFinal=31/12/2025';
                
                // Criar um teste assíncrono manualmente
                let testeCompleto = false;
                let testePassou = false;
                let mensagemErro = '';
                
                fetch(urlTeste)
                    .then(response => {
                        if (response.ok) {
                            return response.json();
                        } else {
                            throw new Error(`HTTP ${response.status}`);
                        }
                    })
                    .then(dados => {
                        // Teste 9: Verificar se os dados são um array não vazio
                        const isArray = Array.isArray(dados);
                        const notEmpty = dados.length > 0;
                        const passou = isArray && notEmpty;
                        
                        if (passou) {
                            testesPassaram++;
                            adicionarResultado('pass', 'API do BCB - dados retornados são um array válido', '');
                        } else {
                            adicionarResultado('fail', 'API do BCB - dados retornados são um array válido', 
                                `É array: ${isArray}, Tamanho: ${dados.length}`);
                        }
                        totalTestes++;
                        testeCompleto = true;
                        
                        // Teste 10: Verificar estrutura do dado (campos valor e data)
                        if (dados && dados.length > 0) {
                            const ultimoItem = dados[dados.length - 1];
                            const temValor = ultimoItem.hasOwnProperty('valor');
                            const temData = ultimoItem.hasOwnProperty('data');
                            const passouEstrutura = temValor && temData;
                            
                            if (passouEstrutura) {
                                testesPassaram++;
                                adicionarResultado('pass', 'API do BCB - estrutura do dado válida (campos valor e data)', '');
                            } else {
                                adicionarResultado('fail', 'API do BCB - estrutura do dado válida', 
                                    `Tem valor: ${temValor}, Tem data: ${temData}`);
                            }
                            totalTestes++;
                            
                            // Teste 11: Valor da Selic é numérico e positivo
                            const valor = parseFloat(ultimoItem.valor);
                            const valorValido = !isNaN(valor) && valor > 0;
                            
                            if (valorValido) {
                                testesPassaram++;
                                adicionarResultado('pass', 'API do BCB - valor da Selic é numérico e positivo', 
                                    `Valor: ${ultimoItem.valor}%`);
                            } else {
                                adicionarResultado('fail', 'API do BCB - valor da Selic é numérico e positivo', 
                                    `Valor obtido: ${ultimoItem.valor}`);
                            }
                            totalTestes++;
                        }
                        
                        // Atualizar resumo se todos os testes assíncronos terminaram
                        atualizarResumoFinal();
                    })
                    .catch(erro => {
                        adicionarResultado('fail', 'API do BCB - comunicação com a API', `Erro: ${erro.message}`);
                        totalTestes++;
                        atualizarResumoFinal();
                    });
                
                // Função auxiliar para adicionar resultado
                function adicionarResultado(tipo, nomeTeste, detalhes) {
                    const div = document.createElement('div');
                    div.className = 'test';
                    if (tipo === 'pass') {
                        div.classList.add('pass');
                        div.innerHTML = `<span class="pass-text">✅ PASS:</span> ${nomeTeste}`;
                    } else {
                        div.classList.add('fail');
                        div.innerHTML = `<span class="fail-text">❌ FAIL:</span> ${nomeTeste}`;
                        if (detalhes) {
                            div.innerHTML += `<br><small style="color:#666;">${detalhes}</small>`;
                        }
                    }
                    resultadosDiv.appendChild(div);
                }
                
                // Função para atualizar o resumo final (será chamada depois que todos os testes assíncronos terminarem)
                let testesAssincronosConcluidos = false;
                function atualizarResumoFinal() {
                    if (testesAssincronosConcluidos) return;
                    testesAssincronosConcluidos = true;

                    // Atualizar o resumo no container
                    const resumoContainer = document.getElementById('resumoContainer');
                    if (resumoContainer) {
                        const percentual = (testesPassaram / totalTestes) * 100;
                        resumoContainer.innerHTML = `
                            <div class="resumo ${percentual === 100 ? 'sucesso' : 'erro'}">
                                📊 Resultado: ${testesPassaram}/${totalTestes} testes passaram (${percentual.toFixed(0)}%)
                            </div>
                        `;
                    }
                }
                    
                
                // Marcar que os testes assíncronos começaram
                setTimeout(() => {
                    if (!testesAssincronosConcluidos) {
                        atualizarResumoFinal();
                    }
                }, 5000); // Timeout de 5 segundos para evitar que fique travado
            } else {
                assert(false, 'API do BCB - fetch disponível', 'O navegador não suporta a API fetch');
            }
            
        }
        
        // Função para expor as funções do script.js para o teste
        function exporFuncoes() {
            if (typeof calcularPrimeiraParcelaSAC !== 'undefined') {
                window.calcularPrimeiraParcelaSAC = calcularPrimeiraParcelaSAC;
            }
            if (typeof calcularParcelaPrice !== 'undefined') {
                window.calcularParcelaPrice = calcularParcelaPrice;
            }
            if (typeof calcularPercentualRenda !== 'undefined') {
                window.calcularPercentualRenda = calcularPercentualRenda;
            }
            if (typeof gerarAlertaOrcamento !== 'undefined') {
                window.gerarAlertaOrcamento = gerarAlertaOrcamento;
            }
        }
        
        // Aguardar o script carregar
        setTimeout(exporFuncoes, 100);
    </script>
</body>
</html>
